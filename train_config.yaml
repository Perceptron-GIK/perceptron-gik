data:
  data_dir: data_hazel_5
  keyboard_files:
    - "Keyboard_18.csv"
  left_files:
    - "Left_18.csv"
  right_files:
    - "Right_12.csv"

experiment:
  mode: "classification" # "coordinate" or "classification"
  alignment_context:
    prev_windows: 0
    future_windows: 0
  append_prev_char_feature: true
  max_seq_length: 19
  normalize: 
    enabled: true
    per_seq: true
  apply_filtering: true
  use_class_weights: false
  dim_reduction:
    enabled: true
    method: pca
    pca:
      dims_ratio: 0.5
  use_augmentation: false
  run_preprocess: true
  export_dataset_csv: true

model:
  model_type: "lstm"
  hidden_dim_inner_model: 512
  hidden_dim_classification_head: 1024
  num_layers: 2
  dropout: 0.362741456039648
  inner_model_prams:
    dropout: 0.33580103298003944
    num_layers: 2
    bidirectional: false

train:
  split_strategy: "stratified_random"
  split_seed: 42
  use_weighted_sampler: true
  synthetic_multiplier: 5
  precompute_synthetic: false
  mixup_alpha: 0.0
  use_ema: false
  ema_decay: 0.999
  early_stopping_metric: "val_loss"
  lm_order: 3
  lm_add_k: 0.05
  lm_beam_width: 20
  lm_beta_values: [0.0, 0.05, 0.1, 0.2, 0.3, 0.4, 0.6, 0.8, 1.0]
  lm_use_interpolated: true
  lm_tta_passes: 1
  lm_tta_noise_std: 0.0
  lm_tta_scale_jitter: 0.0
  sequence_lm_beta: 0.0
  sequence_aux_weight: 0.5
  reverse_time_aug_prob: 0.0
  batch_size: 32
  learning_rate: 0.0003228602342701459
  weight_decay: 1.2417981404367497e-05
  epochs: 300
  early_stopping: 40

modes:
  classification:
    use_class_weights: false
    output_logits: "NUM_CLASSES"
    is_one_hot: true
    key_mapping_dict: CHAR_TO_INDEX
    return_class_id: false
    regression: false
    loss: FocalLoss
    loss_params:
      gamma: 2.5

  coordinate:
    use_class_weights: true
    output_logits: 2
    is_one_hot: false
    key_mapping_dict: "CHAR_TO_INDEX"
    return_class_id: true
    regression: true
    loss: CoordinateLossClassification
    loss_params:
      h_v_ratio: 0.8
      bias: 0.3
 
 