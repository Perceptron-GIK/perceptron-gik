data:
  data_dir: data_hazel_7
  keyboard_files:
    - "Keyboard_20.csv"
  left_files:
    - "Left_20.csv"
  right_files:
    - "Right_14.csv"

experiment:
  mode: "classification" # "coordinate" or "classification"
  max_seq_length: 19
  normalize: 
    enabled: true
    per_seq: true
  apply_filtering: true
  use_class_weights: false
  dim_reduction:
    enabled: true
    method: pca
    pca:
      dims_ratio: 0.5
  use_augmentation: false
  run_preprocess: true
  export_dataset_csv: true

model:
  model_type: "glove_typing"
  hidden_dim_inner_model: 512
  hidden_dim_classification_head: 1024
  num_layers: 2
  dropout: 0.362741456039648
  inner_model_prams:
    dropout: 0.5
    # num_layers: 2
    # bidirectional: false
    num_res_blocks: 3      # number of 1-D residual blocks (paper uses 3)
    attn_reduction: 2 

train:
  batch_size: 32
  learning_rate: 0.0003228602342701459
  weight_decay: 1.2417981404367497e-05
  epochs: 300
  early_stopping: 40

modes:
  classification:
    use_class_weights: false
    use_class_weights: false
    output_logits: "NUM_CLASSES"
    is_one_hot: true
    key_mapping_dict: CHAR_TO_INDEX
    return_class_id: false
    regression: false
    loss: FocalLoss
    loss_params:
      gamma: 2.5

  coordinate:
    use_class_weights: true
    output_logits: 2
    is_one_hot: false
    key_mapping_dict: "FULL_COORDS"
    return_class_id: true
    regression: true
    loss: CoordinateLossClassification
    loss_params:
      h_v_ratio: 0.8
      bias: 0.3